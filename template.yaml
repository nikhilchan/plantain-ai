AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  SAM template for a single-lambda Plantain AI application with tool calling.

Globals:
  Function:
    Timeout: 60
    MemorySize: 256

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: plantain-ai-users
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: plantain-ai-frontend
      GenerateSecret: false

  ChatApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.lambda_handler
      Runtime: python3.9
      Events:
        PostEvent:
          Type: Api
          Properties:
            Path: /chat
            Method: post
            RestApiId: !Ref ChatApi
            Auth:
              Authorizer: CognitoAuthorizer
        OptionsEvent:
          Type: Api
          Properties:
            Path: /chat
            Method: options
            RestApiId: !Ref ChatApi
            Auth:
              Authorizer: NONE

Outputs:
  UserPoolId:
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Value: !Ref CognitoUserPoolClient
  ApiEndpoint:
    Value: !Sub "https://${ChatApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/chat"